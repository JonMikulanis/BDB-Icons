<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Icon Library</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css" />
</head>
<body>

  <div class="header">
    <div class="header-top">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </div>
      <span class="app-title">Icon Library</span>
      <span class="icon-count" id="icon-count">0</span>
    </div>

    <div class="search-row">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search icons…" oninput="filterIcons(this.value)" />
      </div>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn-primary" onclick="document.getElementById('file-input').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add Icons
    </button>
    <button class="btn-ghost" onclick="clearAll()" id="clear-btn" title="Remove all icons from this file">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6M14 11v6"/>
      </svg>
    </button>
    <input type="file" id="file-input" accept=".svg" multiple style="display:none" onchange="handleUpload(this)" />
  </div>

  <div id="toast" class="toast"></div>

  <div class="content">
    <div id="empty-state" class="empty-state">
      <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="8" y="8" width="20" height="20" rx="2"/>
        <rect x="36" y="8" width="20" height="20" rx="2"/>
        <rect x="8" y="36" width="20" height="20" rx="2"/>
        <rect x="36" y="36" width="20" height="20" rx="2"/>
        <line x1="46" y1="46" x2="46" y2="52"/><line x1="43" y1="49" x2="49" y2="49"/>
      </svg>
      <p class="empty-title">No icons yet</p>
      <p class="empty-sub">Click <strong>Add Icons</strong> to upload your SVG files. Icons are saved inside this PowerPoint file.</p>
    </div>

    <div id="icon-grid" class="icon-grid"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
